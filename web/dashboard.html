<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <header class="header">
    <nav class="nav">
        <a class="dashboard-btn" type="button">Inicio</a>
        <a class="settings-btn" type="button">Ajustes</a>
        <a class="profile-btn" type="button">Perfil</a>
        <a class="logout-btn" type="button">Salir</a>
    </nav>
    </header>
    
    <div class="main-container">
        <div class="dashboard-content">
            <h1>Mis Notas</h1>
            <div class="dashboard-actions">
                <button class="primary create-note-btn">+ Nueva Nota</button>
                <button class="primary upload-note-btn">Subir Archivo</button>
                <input type="file" id="md-file-input" accept=".md" style="display: none;">
            </div>
            <div id="notes-container" class="notes-grid">
                <div class="loading">Cargando notas</div>
            </div>
        </div>
    </div>
    <div class="create-note-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="create-note" style="background-color: white; padding: 2rem; border: 2px solid black; min-width: 400px; max-width: 500px;">
            <h2 style="margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em;">Nueva Nota</h2>
            <p style="margin-bottom: 0.5rem; font-weight: 600;">Título</p>
            <input type="text" class="note-title-input" style="width: 100%; padding: 0.75rem; border: 2px solid black; font-family: inherit; font-size: 1rem; margin-bottom: 1.5rem;">
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="cancel-note-button" style="padding: 0.5rem 1.5rem; border: 2px solid black; background: white; cursor: pointer; font-family: inherit; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">Cancelar</button>
                <button class="create-note-button" style="padding: 0.5rem 1.5rem; border: 2px solid black; background: black; color: white; cursor: pointer; font-family: inherit; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">Aceptar</button>
            </div>
        </div>
    </div>
    <script src="./static/js/dashboard.js"></script>
    <script src="/static/js/theme.js"></script>
</body>
</html>
