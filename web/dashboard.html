<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <header class="header">
    <nav class="nav">
        <a class="dashboard-btn" type="button">Inicio</a>
        <a class="settings-btn" type="button">Ajustes</a>
        <a class="profile-btn" type="button">Perfil</a>
        <a class="logout-btn" type="button">Salir</a>
    </nav>
    </header>
    
    <div class="main-container">
        <div class="dashboard-content">
            <h1>Mis Notas</h1>
            <div class="dashboard-actions">
                <button class="primary create-note-btn">+ Nueva Nota</button>
            </div>
            <div id="notes-container" class="notes-grid">
                <div class="loading">Cargando notas</div>
            </div>
        </div>
    </div>
    
    <script src="./static/js/dashboard.js"></script>
    <script src="/static/js/theme.js"></script>
</body>
</html>
