<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>
    <link rel="stylesheet" href="/static/css/note.css">
</head>
<body>
    <div class="toolbar">
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button class="come-back">Volver</button>
            <button class="toggle-mode" id="toggleMode">Preview</button>
        </div>
        <span id="save-status">✓ Guardado</span>
    </div>
    
    <div class="formatting-toolbar" id="formattingToolbar">
        <button class="format-btn" data-format="h1" title="Título (H1)">
            <strong>H1</strong>
        </button>
        <button class="format-btn" data-format="h2" title="Subtítulo (H2)">
            <strong>H2</strong>
        </button>
        <button class="format-btn" data-format="h3" title="H3">
            <strong>H3</strong>
        </button>
        <span class="toolbar-divider"></span>
        <button class="format-btn" data-format="bold" title="Negrita">
            <strong>B</strong>
        </button>
        <button class="format-btn" data-format="italic" title="Cursiva">
            <em>I</em>
        </button>
        <button class="format-btn" data-format="strikethrough" title="Tachado">
            <span style="text-decoration: line-through;">S</span>
        </button>
        <span class="toolbar-divider"></span>
        <button class="format-btn" data-format="code" title="Código en línea">
            <code>&lt;/&gt;</code>
        </button>
        <button class="format-btn" data-format="codeblock" title="Bloque de código">
            <code>{ }</code>
        </button>
        <span class="toolbar-divider"></span>
        <button class="format-btn" data-format="ul" title="Lista con viñetas">
            ≡
        </button>
        <button class="format-btn" data-format="ol" title="Lista numerada">
            1.
        </button>
        <button class="format-btn" data-format="quote" title="Cita">
            "
        </button>
        <span class="toolbar-divider"></span>
        <button class="format-btn" data-format="link" title="Enlace">
            🔗
        </button>
        <button class="format-btn" data-format="image" title="Imagen">
            🖼
        </button>
        <button class="format-btn" data-format="hr" title="Línea horizontal">
            —
        </button>
    </div>
    
    <div id="editorMode" class="mode-container active">
        <input type="text" id="title" placeholder="Título..." />
        <textarea id="editor" placeholder="Escribe tu contenido en markdown..."></textarea>
    </div>
    
    <div id="viewerMode" class="mode-container">
        <h1 id="viewerTitle"></h1>
        <div id="viewerContent" class="markdown-body"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/note.js"></script>
    <script src="/static/js/theme.js"></script>
</body>
</html>
